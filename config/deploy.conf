# ==============================================================================
# deploy.conf — Controls what deploy_configs.sh deploys
# ==============================================================================
#
# This file is read by scripts/deploy_configs.sh to decide which config groups
# to symlink. Set values to "yes" or "no".
#
# The idea: config/ contains universal dotfiles (shell, git, vim, etc.) that
# work on any system. The i3-specific files (xinitrc, picom, dunst, etc.) are
# only deployed when USE_I3=yes. This way the same repo serves both:
#   - Debian minimal + i3  (USE_I3=yes, USE_STARTX=yes)
#   - Pop!_OS / Ubuntu DE  (USE_I3=no,  USE_STARTX=no)
#
# After editing, re-run: ./scripts/deploy_configs.sh
# ==============================================================================

# --- Universal dotfiles (config/) -------------------------------------------
# These are always deployed: .zprofile, .zshrc, .vimrc, .gitconfig, .p10k.zsh,
# .profile, .bashrc, .bash_logout, .screenrc

# --- i3 window manager + X11 session ----------------------------------------
# Deploy: i3 config, picom, rofi, dunst, xinitrc, xserverrc, Xresources
USE_I3=yes

# --- auto-startx from TTY ---------------------------------------------------
# Creates ~/.config/walu/use_startx flag so .zprofile runs `exec startx` on
# tty1. Only meaningful when USE_I3=yes. Set to "no" on DE-based systems.
USE_STARTX=yes

# --- VSCode settings ---------------------------------------------------------
# Deploy programs/vscode/{settings,keybindings}.json to ~/.config/Code/User/
USE_VSCODE=yes

# --- Tilix color schemes -----------------------------------------------------
# Deploy programs/tilix/schemes/*.json to ~/.config/tilix/schemes/
USE_TILIX=yes

# --- Xorg system configs (requires --system flag) ----------------------------
# Deploy programs/xorg/40-libinput.conf to /etc/X11/xorg.conf.d/
# Only used with: ./deploy_configs.sh --system
USE_XORG_SYSTEM=yes
