# i3status configuration file for Debian 13 + i3 on MSI Modern 14
# See: man i3status

general {
    interval = 2
    colors = true
    color_good = "#FFFFFF"
    color_degraded = "#FBB86C"
    color_bad = "#d75f5f"
}

order += "wireless _first_"
order += "ethernet _first_"
order += "volume master"
order += "battery 0"
order += "disk /"
order += "cpu_usage"
order += "tztime local"

wireless _first_ {
    format_up = " %quality %essid "
    format_down = " down "
}

ethernet _first_ {
    format_up = " %ip "
    format_down = ""
}

volume master {
    format = " %volume "
    format_muted = " %volume "
    device = "pulse"
    mixer = "Master"
    mixer_idx = 0
}

battery 0 {
    format = "%status %percentage %remaining "
    format_down = ""
    status_chr = " CHR"
    status_bat = " BAT"
    status_unk = " UNK"
    status_full = " FULL"
    low_threshold = 15
    threshold_type = percentage
    path = "/sys/class/power_supply/BAT%d/uevent"
}

disk "/" {
    format = " %avail "
}

cpu_usage {
    format = " %usage "
}

tztime local {
    format = " %Y-%m-%d %H:%M "
}
