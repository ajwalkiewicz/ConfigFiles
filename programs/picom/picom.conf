# Picom compositor configuration
# For Debian 13 + i3 on MSI Modern 14 B11MO (Intel Iris Xe)
# See: man picom
#
# VM NOTE: If running in a VM, change backend to "xrender" and set vsync = false
#          if you experience graphical glitches or black screens.

# ==============================================================================
# Backend
# ==============================================================================

# Use "glx" on real hardware, "xrender" in VMs without 3D acceleration
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;

# ==============================================================================
# VSync — prevents screen tearing
# ==============================================================================

vsync = true;

# ==============================================================================
# Fading
# ==============================================================================

fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;
no-fading-openclose = false;

# ==============================================================================
# Shadows
# ==============================================================================

shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.5;

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Dunst'",
    "class_g = 'i3-frame'",
    "_GTK_FRAME_EXTENTS@:c",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];

# ==============================================================================
# Opacity
# ==============================================================================

inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    "95:class_g = 'Tilix'",
    "95:class_g = 'URxvt'"
];

# ==============================================================================
# Focus
# ==============================================================================

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

# ==============================================================================
# Window type rules
# ==============================================================================

wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.9; focus = true; };
    dock = { shadow = false; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 1.0; };
    dropdown_menu = { opacity = 1.0; };
};
