# Keyboard remapping
# Deploy to: /etc/X11/xorg.conf.d/00-keyboard.conf
# Requires: xserver-xorg-input-libinput
#
# Maps CapsLock to Ctrl (no CapsLock functionality remains).
# To swap instead of replace, use "ctrl:swapcaps".

Section "InputClass"
    Identifier      "keyboard defaults"
    MatchIsKeyboard "on"
    Option          "XkbOptions" "ctrl:nocaps"
EndSection
