# Touchpad configuration for MSI Modern 14 B11MO
# Deploy to: /etc/X11/xorg.conf.d/40-libinput.conf
# Requires: xserver-xorg-input-libinput

Section "InputClass"
    Identifier      "libinput touchpad"
    MatchIsTouchpad "on"
    MatchDevicePath "/dev/input/event*"
    Driver          "libinput"

    # Tap to click
    Option "Tapping" "on"
    Option "TappingDrag" "on"

    # Natural (reverse) scrolling — matches Pop!_OS default
    Option "NaturalScrolling" "on"

    # Two-finger scrolling
    Option "ScrollMethod" "twofinger"

    # Disable touchpad while typing
    Option "DisableWhileTyping" "on"

    # Click method: clickfinger = two-finger right-click, three-finger middle
    Option "ClickMethod" "clickfinger"

    # Acceleration
    Option "AccelProfile" "adaptive"
    Option "AccelSpeed" "0.3"
EndSection
